name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup .NET
        uses: actions/setup-dotnet@a66eefa2bf2572fc311ea6ff65a7b6ecc4df96a6
        with:
          dotnet-version: '10.0.106'

      - name: Restore
        run: dotnet restore ClrScopeMCP.slnx --locked-mode

      - name: Build
        run: dotnet build --no-restore -c Release ClrScopeMCP.slnx

      - name: Test with coverage (exclude Live tests)
        run: dotnet test --no-build -c Release tests/ClrScope.Mcp.Tests/ClrScope.Mcp.Tests.csproj --filter "Category!=Live" --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/**/coverage.cobertura.xml
          flags: unittests
          name: codecov-${{ matrix.os }}
          fail_ci_if_error: false

      - name: Pack NuGet package
        run: dotnet pack src/ClrScope.Mcp/ClrScope.Mcp.csproj -c Release --no-build

      - name: Verify NuGet package created
        run: |
          if [ ! -f src/ClrScope.Mcp/bin/Release/*.nupkg ]; then
            echo "NuGet package not found"
            exit 1
          fi
          echo "NuGet package created successfully"
        shell: bash

      - name: Extract NuGet package to verify contents (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $package = Get-ChildItem 'src/ClrScope.Mcp/bin/Release/*.nupkg' | Select-Object -First 1
          if (-not $package) {
            Write-Error "NuGet package not found"
            exit 1
          }
          $destination = 'src/ClrScope.Mcp/bin/Release/temp_extract'
          if (Test-Path $destination) {
            Remove-Item $destination -Recurse -Force
          }
          Expand-Archive -Path $package.FullName -DestinationPath $destination -Force
        shell: pwsh

      - name: Extract NuGet package to verify contents (Non-Windows)
        if: matrix.os != 'windows-latest'
        run: |
          cd src/ClrScope.Mcp/bin/Release
          rm -rf temp_extract
          unzip -q *.nupkg -d temp_extract
        shell: bash

      - name: Verify version in package
        run: |
          VERSION=$(grep -o '<version>[^<]*</version>' src/ClrScope.Mcp/bin/Release/temp_extract/ClrScope.Mcp.nuspec | sed 's/<version>//g' | sed 's/<\/version>//g' | tr -d ' ')
          echo "Package version: $VERSION"
          if [ -z "$VERSION" ]; then
            echo "Version not found in package"
            exit 1
          fi
          echo "Version found: $VERSION"
        shell: bash

      - name: Build binary for validation
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            dotnet publish src/ClrScope.Mcp/ClrScope.Mcp.csproj -c Release -r linux-x64 --self-contained false -p:DebugSymbols=false -p:DebugType=None -o ./test-artifacts/linux-x64 --no-build
            chmod +x test-artifacts/linux-x64/ClrScope.Mcp
            ./test-artifacts/linux-x64/ClrScope.Mcp --version
          elif [ "${{ runner.os }}" = "Windows" ]; then
            dotnet publish src/ClrScope.Mcp/ClrScope.Mcp.csproj -c Release -r win-x64 --self-contained false -p:DebugSymbols=false -p:DebugType=None -o ./test-artifacts/win-x64 --no-build
            ./test-artifacts/win-x64/ClrScope.Mcp.exe --version
          elif [ "${{ runner.os }}" = "macOS" ]; then
            dotnet publish src/ClrScope.Mcp/ClrScope.Mcp.csproj -c Release -r osx-arm64 --self-contained false -p:DebugSymbols=false -p:DebugType=None -o ./test-artifacts/osx-arm64 --no-build
            chmod +x test-artifacts/osx-arm64/ClrScope.Mcp
            ./test-artifacts/osx-arm64/ClrScope.Mcp --version
          fi
        shell: bash

  bench-build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup .NET
        uses: actions/setup-dotnet@a66eefa2bf2572fc311ea6ff65a7b6ecc4df96a6
        with:
          dotnet-version: '10.0.106'

      - name: Restore
        run: dotnet restore ClrScopeMCP.slnx

      - name: Build benchmarks
        run: dotnet build --no-restore -c Release bench/ClrScope.Benchmarks/ClrScope.Benchmarks.csproj

  live-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release-'))
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup .NET
        uses: actions/setup-dotnet@a66eefa2bf2572fc311ea6ff65a7b6ecc4df96a6
        with:
          dotnet-version: '10.0.106'

      - name: Restore
        run: dotnet restore ClrScopeMCP.slnx --locked-mode

      - name: Build
        run: dotnet build --no-restore -c Release ClrScopeMCP.slnx

      - name: Run Live Integration Tests
        run: dotnet test --no-build -c Release tests/ClrScope.Mcp.Tests/ClrScope.Mcp.Tests.csproj --filter "Category=Live" --logger "console;verbosity=detailed"
