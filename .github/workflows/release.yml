name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-binaries:
    strategy:
      matrix:
        rid: [win-x64, linux-x64, linux-arm64, osx-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.100'

      - name: Restore
        run: dotnet restore src/ClrScope.Mcp/ClrScope.Mcp.csproj --locked-mode

      - name: Publish ${{ matrix.rid }}
        run: dotnet publish src/ClrScope.Mcp/ClrScope.Mcp.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false -p:DebugSymbols=false -p:DebugType=None -o ./artifacts/${{ matrix.rid }}

      - name: Package
        run: |
          cd artifacts/${{ matrix.rid }}
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            zip -r ../../clrscope-mcp-${{ matrix.rid }}.zip .
          else
            tar czf ../../clrscope-mcp-${{ matrix.rid }}.tar.gz .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.rid }}
          path: clrscope-mcp-${{ matrix.rid }}.*

  build-nuget:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.100'

      - name: Restore
        run: dotnet restore src/ClrScope.Mcp/ClrScope.Mcp.csproj --locked-mode

      - name: Pack
        run: dotnet pack src/ClrScope.Mcp/ClrScope.Mcp.csproj -c Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: src/ClrScope.Mcp/bin/Release/*.nupkg

  publish-github-release:
    needs: [build-binaries, build-nuget]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.zip *.tar.gz > SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: |
            artifacts/*.*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-nuget:
    needs: [build-nuget]
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nuget-package
          path: ./artifacts

      - name: Publish to NuGet
        run: dotnet nuget push artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.NUGET_API_KEY }}
