name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-binaries:
    strategy:
      matrix:
        rid: [win-x64, linux-x64, linux-arm64, osx-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup .NET
        uses: actions/setup-dotnet@a66eefa2bf2572fc311ea6ff65a7b6ecc4df96a6
        with:
          dotnet-version: '10.0.100'

      - name: Restore
        run: dotnet restore src/ClrScope.Mcp/ClrScope.Mcp.csproj --locked-mode

      - name: Publish ${{ matrix.rid }}
        run: dotnet publish src/ClrScope.Mcp/ClrScope.Mcp.csproj -c Release -r ${{ matrix.rid }} --self-contained false -p:DebugSymbols=false -p:DebugType=None -o ./artifacts/${{ matrix.rid }}

      - name: Package
        run: |
          cd artifacts/${{ matrix.rid }}
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            zip -r ../../clrscope-mcp-${{ matrix.rid }}.zip .
          else
            tar czf ../../clrscope-mcp-${{ matrix.rid }}.tar.gz .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: binary-${{ matrix.rid }}
          path: clrscope-mcp-${{ matrix.rid }}.*

  build-nuget:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup .NET
        uses: actions/setup-dotnet@a66eefa2bf2572fc311ea6ff65a7b6ecc4df96a6
        with:
          dotnet-version: '10.0.100'

      - name: Restore
        run: dotnet restore src/ClrScope.Mcp/ClrScope.Mcp.csproj --locked-mode

      - name: Pack
        run: dotnet pack src/ClrScope.Mcp/ClrScope.Mcp.csproj -c Release

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: nuget-package
          path: src/ClrScope.Mcp/bin/Release/*.nupkg

  publish-github-release:
    needs: [build-binaries, build-nuget]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          path: ./artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name "*.zip" -o -name "*.tar.gz" | xargs sha256sum > SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@4dd30955cca228da305ffee6fbc3fc1f95d447c2
        with:
          draft: true
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
            artifacts/SHA256SUMS
            artifacts/**/*.nupkg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-nuget:
    needs: [build-nuget]
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: nuget-package
          path: ./artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@a66eefa2bf2572fc311ea6ff65a7b6ecc4df96a6
        with:
          dotnet-version: '10.0.100'

      - name: Publish to NuGet with trusted publishing
        run: dotnet nuget push artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate
